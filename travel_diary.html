<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Дневник путешествий</title>
<style>
body { font-family: Arial; margin: 40px; }
.travel { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
img { max-width: 300px; display: block; margin-top: 10px; }
</style>
</head>
<body>

<h1>Дневник путешествий</h1>

<h2>Вход / Регистрация</h2>
<input id="username" placeholder="Введите имя">
<button onclick="login()">Войти</button>

<h2>Добавить путешествие</h2>
<input id="location" placeholder="Местоположение">
<input id="cost" placeholder="Стоимость (в $)">
<input id="imageURL" placeholder="Ссылка на изображение">
<br><br>
<button onclick="addTravel()">Добавить путешествие</button>

<h2>Путешествия</h2>
<div id="travels"></div>

<script>
let currentUser = "";
let travels = [];
let users = {};

function login() {
currentUser = document.getElementById("username").value;
if (!users[currentUser]) users[currentUser] = {};
alert("Вы вошли как " + currentUser);
renderTravels();
}

function addTravel() {
let travel = {
author: currentUser,
location: document.getElementById("location").value,
cost: document.getElementById("cost").value,
image: document.getElementById("imageURL").value
};
travels.push(travel);
renderTravels();
}

function renderTravels() {
let container = document.getElementById("travels");
container.innerHTML = "";

travels.forEach(t => {
let div = document.createElement("div");
div.className = "travel";
div.innerHTML = `
<b>${t.author}</b><br>
Местоположение: ${t.location}<br>
Стоимость: $${t.cost}<br>
${t.image ? `<img src="${t.image}" alt="Фото путешествия">` : ""}
`;
container.appendChild(div);
});
}
</script>

</body>
</html>
